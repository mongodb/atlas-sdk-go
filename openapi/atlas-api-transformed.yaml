        value:
          type: string
          description: Value of the tag.
    BaseSearchIndexResponseLatestDefinition:
      properties:
        analyzer:
          type: string
          description: |-
            Specific pre-defined method chosen to convert database field text into searchable words. This conversion reduces the text of fields into the smallest units of text. These units are called a **term** or **token**. This process, known as tokenization, involves making the following changes to the text in fields:

            - extracting words
            - removing punctuation
            - removing accents
            - changing to lowercase
            - removing common words
            - reducing words to their root form (stemming)
            - changing words to their base form (lemmatization)
             MongoDB Cloud uses the process you select to build the Atlas Search index.
          externalDocs:
            description: Atlas Search Analyzers
            url: https://dochub.mongodb.org/core/analyzers--fts
          default: lucene.standard
          x-xgen-IPA-exception:
            xgen-IPA-123-enum-values-must-be-upper-snake-case: Schema predates IPA validation.
            xgen-IPA-123-allowable-enum-values-should-not-exceed-20: Schema predates IPA validation.
        analyzers:
          type: array
          description: List of user-defined methods to convert database field text into searchable words.
          externalDocs:
            description: Custom Atlas Search Analyzers
            url: https://dochub.mongodb.org/core/custom-fts
          items:
            $ref: "#/components/schemas/AtlasSearchAnalyzer"
          x-xgen-IPA-exception:
            xgen-IPA-124-array-max-items: Schema predates IPA validation.
        mappings:
          $ref: "#/components/schemas/SearchMappings"
        numPartitions:
          type: integer
          description: Number of index partitions. Allowed values are [1, 2, 4].
          format: int32
          default: 1
        searchAnalyzer:
          type: string
          description: Method applied to identify words when searching this index.
          default: lucene.standard
          x-xgen-IPA-exception:
            xgen-IPA-123-enum-values-must-be-upper-snake-case: Schema predates IPA validation.
            xgen-IPA-123-allowable-enum-values-should-not-exceed-20: Schema predates IPA validation.
        sort:
          type: object
          description: 'Sort definition for the index. When defined, the index will be pre-sorted on the specified fields, which improves query sort performance for those fields. Supports two formats: simple format with field name and direction, or complex format with additional options. The `order` field is required (1=ascending, -1=descending).The `noData` field is optional and controls how missing values are sorted(default: "lowest").'
          example:
            fieldName: 1
            anotherField:
              order: -1
              noData: highest
        storedSource:
          type: object
          description: Flag that indicates whether to store all fields (true) on Atlas Search. By default, Atlas doesn't store (false) the fields on Atlas Search.  Alternatively, you can specify an object that only contains the list of fields to store (include) or not store (exclude) on Atlas Search. Note that storing all fields (true) is not allowed for vector search indexes. To learn more, see Stored Source Fields.
          example:
            include | exclude:
              - field1
              - field2
          externalDocs:
            description: Stored Source Fields
            url: https://dochub.mongodb.org/core/atlas-search-stored-source
        synonyms:
          type: array
          description: Rule sets that map words to their synonyms in this index.
          externalDocs:
            description: Synonym Mapping
            url: https://dochub.mongodb.org/core/fts-synonym-mappings
          items:
            $ref: "#/components/schemas/SearchSynonymMappingDefinition"
          x-xgen-IPA-exception:
            xgen-IPA-124-array-max-items: Schema predates IPA validation.
        typeSets:
          maxItems: 100
          type: array
          description: Type sets for the index.
          items:
            $ref: "#/components/schemas/SearchTypeSets"
        fields:
          type: array
          description: Settings that configure the fields, one per object, to index. You must define at least one "vector" type field. You can optionally define "filter" type fields also.
          externalDocs:
            description: Vector Search Fields
            url: https://dochub.mongodb.org/core/avs-vector-type
          items:
            $ref: "#/components/schemas/BasicDBObject"
          x-xgen-IPA-exception:
            xgen-IPA-124-array-max-items: Schema predates IPA validation.
        nestedRoot:
          type: string
          description: Top-level path to the array that contains vector fields. When provided, vector fields under this path are treated as nested.
          example: sections
