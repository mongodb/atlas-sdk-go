        name:
          type: string
          description: Human-readable label that identifies this index. Within each namespace, names of all indexes in the namespace must be unique.
        numPartitions:
          type: integer
          description: Number of index partitions. Allowed values are [1, 2, 4].
          format: int32
          default: 1
        status:
          type: string
          description: |-
            Condition of the search index when you made this request.

            - `IN_PROGRESS`: Atlas is building or re-building the index after an edit.
            - `STEADY`: You can use this search index.
            - `FAILED`: Atlas could not build the index.
            - `MIGRATING`: Atlas is upgrading the underlying cluster tier and migrating indexes.
            - `PAUSED`: The cluster is paused.
          readOnly: true
        storedSource:
          type: object
          description: Flag that indicates whether to store all fields (true) on Atlas Search. By default, Atlas doesn't store (false) the fields on Atlas Search.  Alternatively, you can specify an object that only contains the list of fields to store (include) or not store (exclude) on Atlas Search. Note that storing all fields (true) is not allowed for vector search indexes. To learn more, see documentation.
